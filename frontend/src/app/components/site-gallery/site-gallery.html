<div class="space-y-8 animate-in">
  <div class="flex justify-between items-center">
    <h3 class="text-2xl font-black tracking-tighter text-slate-900 dark:text-slate-50">Site Visual Intelligence</h3>
    <div class="flex gap-3">
      <button class="p-3 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-xl text-slate-400 hover:text-blue-600 transition-all shadow-sm">
        <span class="material-symbols-outlined">filter_list</span>
      </button>
      <button class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-500/20 hover:scale-105 transition-all">
        Upload Media
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (photo of photos; track photo.url) {
      <div class="group relative aspect-square bg-slate-100 dark:bg-slate-800 rounded-3xl overflow-hidden border border-white/20 shadow-xl">
        <img [src]="photo.url" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" />
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        
        <div class="absolute bottom-0 left-0 right-0 p-6 translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-500">
          <span class="bg-blue-600 text-white text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded mb-2 inline-block">{{ photo.category }}</span>
          <h4 class="text-white font-black tracking-tight">{{ photo.title }}</h4>
          <p class="text-white/60 text-[10px] font-bold uppercase tracking-widest mt-1">{{ photo.date }}</p>
        </div>

        <div class="absolute top-4 right-4 flex gap-2 translate-y-[-10px] group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
          <button class="w-8 h-8 rounded-lg bg-white/20 backdrop-blur-md text-white flex items-center justify-center hover:bg-white/40 transition-all">
            <span class="material-symbols-outlined text-[18px]">zoom_in</span>
          </button>
          <button class="w-8 h-8 rounded-lg bg-white/20 backdrop-blur-md text-white flex items-center justify-center hover:bg-white/40 transition-all">
            <span class="material-symbols-outlined text-[18px]">download</span>
          </button>
        </div>
      </div>
    }
    
    <!-- Add Button Card -->
    <button class="aspect-square rounded-3xl border-2 border-dashed border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center gap-4 text-slate-400 hover:text-blue-600 group hover:border-blue-500/50 hover:bg-blue-50/50 dark:hover:bg-blue-900/10 transition-all">
      <div class="w-16 h-16 rounded-2xl bg-slate-50 dark:bg-slate-900 flex items-center justify-center shadow-inner group-hover:scale-110 transition-transform">
        <span class="material-symbols-outlined text-3xl">add_a_photo</span>
      </div>
      <span class="text-[10px] font-black uppercase tracking-widest">Add New Capture</span>
    </button>
  </div>
</div>
