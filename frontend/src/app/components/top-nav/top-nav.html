<header class="flex items-center justify-between w-full h-16 px-8 sticky top-0 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md shadow-[0_12_32px_rgba(15,23,42,0.06)] border-none z-30 font-sans font-semibold text-lg">
  <div class="flex items-center flex-1">
    <div class="relative w-full max-w-md rounded-full transition-all">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
      <input (click)="showSearch = true" readonly class="cursor-pointer w-full bg-surface-container-low dark:bg-slate-800 border-none rounded-full py-2 pl-12 pr-16 text-sm font-normal focus:ring-0 select-none" placeholder="Search projects, tasks, or files..." type="text">
      <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 bg-white border border-slate-200 px-1.5 py-0.5 rounded">⌘K</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button (click)="toggleDarkMode()" class="hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full p-2 transition-all">
      <span class="material-symbols-outlined text-slate-500">
        {{ isDarkMode ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>
    <button class="hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full p-2 transition-all relative">
      <span class="material-symbols-outlined text-slate-500">notifications</span>
      <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
    </button>
    <button class="hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full p-2 transition-all">
      <span class="material-symbols-outlined text-slate-500">help_outline</span>
    </button>
    <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
    <div class="flex items-center gap-3 ml-2 group cursor-pointer">
      <div class="text-right">
        <p class="text-sm font-semibold text-slate-900 dark:text-slate-50 leading-none">Arjun Mehra</p>
        <p class="text-[10px] text-slate-500 uppercase tracking-wider font-bold mt-1">Project Director</p>
      </div>
      <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200&auto=format&fit=crop" alt="User Profile" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover">
    </div>
  </div>
</header>

@if (showSearch) {
  <app-global-search (close)="showSearch = false"></app-global-search>
}
