<div class="fixed bottom-8 right-8 z-[100] flex flex-col items-end gap-4 pointer-events-none">
  <!-- Action Menu -->
  <div [class.translate-y-0]="isOpen" [class.opacity-100]="isOpen" [class.translate-y-4]="!isOpen" [class.opacity-0]="!isOpen" [class.pointer-events-auto]="isOpen" class="flex flex-col gap-3 transition-all duration-300 ease-out">
    @for (action of actions; track action.label) {
      <button class="flex items-center gap-3 group animate-in">
        <span class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity shadow-xl">{{ action.label }}</span>
        <div [class]="action.color" class="w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-xl hover:scale-110 active:scale-95 transition-all">
          <span class="material-symbols-outlined text-2xl">{{ action.icon }}</span>
        </div>
      </button>
    }
  </div>

  <!-- Main FAB -->
  <button (click)="toggle()" class="pointer-events-auto w-16 h-16 bg-gradient-to-br from-primary to-primary-container text-white rounded-[24px] shadow-2xl shadow-primary/30 flex items-center justify-center hover:scale-110 active:scale-95 transition-all group overflow-hidden relative">
    <div [class.rotate-45]="isOpen" class="transition-transform duration-300 relative z-10 flex items-center justify-center">
      <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">add</span>
    </div>
    <!-- Subtle Pulse -->
    <div class="absolute inset-0 bg-white/20 animate-ping opacity-0 group-hover:opacity-100 pointer-events-none"></div>
  </button>
</div>
